server:
  public_url: "http://127.0.0.1:18080"

auth:
  p115_cookies: "UID=xxx; CID=xxx; SEID=xxx"

strm:
  media_ext:
    - mp4
    - mkv
    - ts
    - iso
    - rmvb
    - avi
    - mov
    - mpeg
    - mpg
    - wmv
    - m4v
    - flv
    - m2ts
  subtitle_ext:
    - srt
    - ass
    - ssa
  overwrite: false
  min_file_size: 0

sync:
  full_cron: "0 3 * * *"
  increment_cron: "*/30 * * * *"
  max_files_per_run: 5000
  batch_size: 500
  batch_sleep_seconds: 2
  item_sleep_seconds: 0
  paths:
    - pan_path: "/strm"
      local_path: "/media"

media_server:
  enabled: false
  type: "emby"
  url: "http://127.0.0.1:8096"
  api_key: ""
  refresh_delay_seconds: 0
